name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # Copy static assets into the standalone bundle
      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Package bundle
        run: tar -czf bundle.tar.gz -C .next/standalone .

      - name: Upload bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: bundle.tar.gz
          target: /home/ubuntu/deploy

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Extract new bundle
            mkdir -p /home/ubuntu/app-new
            tar -xzf /home/ubuntu/deploy/bundle.tar.gz -C /home/ubuntu/app-new

            # Swap atomically
            rm -rf /home/ubuntu/app-old
            if [ -d /home/ubuntu/app ]; then
              mv /home/ubuntu/app /home/ubuntu/app-old
            fi
            mv /home/ubuntu/app-new /home/ubuntu/app

            # Reload service
            sudo systemctl restart ia4devs

            # Clean up
            rm -f /home/ubuntu/deploy/bundle.tar.gz
            rm -rf /home/ubuntu/app-old

            echo "Deployment complete"
